name: Build Rock 4 SE Image

on:
  push:
    branches: [arm64-native-build, weixin]
    paths-ignore: ['*.md', 'LICENSE', '.gitignore']
  workflow_dispatch:
    inputs:
      suite:
        description: 'Debian suite (radxa kernel is bookworm-only)'
        required: true
        default: 'bookworm'
        type: choice
        options: [bookworm, trixie, sid]
      kernel:
        description: 'Kernel type (radxa is bookworm-only)'
        required: true
        default: 'radxa'
        type: choice
        options: [radxa, standard]
      nvme:
        description: 'Enable NVMe root migration'
        required: true
        default: 'no'
        type: choice
        options: ['yes', 'no']
      desktop:
        description: 'Desktop environment'
        required: true
        default: 'none'
        type: choice
        options: [none, xfce4, gnome, mate, cinnamon, lxqt, lxde, budgie, kde]

jobs:
  validate-radxa:
    if: github.event_name == 'push' && github.ref == 'refs/heads/arm64-native-build'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    env:
      SUITE: bookworm
      KERNEL: radxa
      NVME: no
      DESKTOP: none

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Install dependencies
        run: |
          chmod +x install.sh
          sudo ./install.sh

      - name: Build image
        run: |
          chmod +x build.sh config/*
          sudo ./build.sh \
            -s $SUITE -d $DESKTOP -k $KERNEL -H no -n $NVME \
            -u debian -p builder -b

      - name: Verify image
        run: |
          IMG=$(ls -t output/*/Debian*.img 2>/dev/null | head -1)
          if [ -z "$IMG" ]; then
            echo "No image file found after build"
            exit 1
          fi
          ls -lh "$IMG"
          rm -f "$IMG"

  validate-standard:
    if: github.event_name == 'push' && github.ref == 'refs/heads/arm64-native-build'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    env:
      SUITE: bookworm
      KERNEL: standard
      NVME: no
      DESKTOP: none

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Install dependencies
        run: |
          chmod +x install.sh
          sudo ./install.sh

      - name: Build image
        run: |
          chmod +x build.sh config/*
          sudo ./build.sh \
            -s $SUITE -d $DESKTOP -k $KERNEL -H no -n $NVME \
            -u debian -p builder -b

      - name: Verify image
        run: |
          IMG=$(ls -t output/*/Debian*.img 2>/dev/null | head -1)
          if [ -z "$IMG" ]; then
            echo "No image file found after build"
            exit 1
          fi
          ls -lh "$IMG"
          rm -f "$IMG"

  validate-weixin:
    if: github.event_name == 'push' && github.ref == 'refs/heads/weixin'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    env:
      SUITE: bookworm
      KERNEL: radxa
      NVME: no
      DESKTOP: xfce4

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Install dependencies
        run: |
          chmod +x install.sh
          sudo ./install.sh

      - name: Build image
        run: |
          chmod +x build.sh config/*
          sudo ./build.sh \
            -s $SUITE -d $DESKTOP -k $KERNEL -H no -n $NVME \
            -u debian -p builder -b

      - name: Verify image
        run: |
          IMG=$(ls -t output/*/Debian*.img 2>/dev/null | head -1)
          if [ -z "$IMG" ]; then
            echo "No image file found after build"
            exit 1
          fi
          ls -lh "$IMG"
          rm -f "$IMG"

  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    env:
      SUITE: ${{ inputs.suite }}
      KERNEL: ${{ inputs.kernel }}
      NVME: ${{ inputs.nvme }}
      DESKTOP: ${{ inputs.desktop }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Install dependencies
        run: |
          chmod +x install.sh
          sudo ./install.sh

      - name: Build image
        run: |
          chmod +x build.sh config/*
          sudo ./build.sh \
            -s $SUITE -d $DESKTOP -k $KERNEL -H no -n $NVME \
            -u debian -p builder -b

      - name: Verify image
        id: find
        run: |
          IMG=$(ls -t output/*/Debian*.img 2>/dev/null | head -1)
          if [ -z "$IMG" ]; then
            echo "No image file found after build"
            exit 1
          fi
          echo "path=$IMG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $IMG)" >> "$GITHUB_OUTPUT"
          ls -lh "$IMG"

      - name: Compress image
        run: |
          xz -T0 -9 "${{ steps.find.outputs.path }}"
          ls -lh "${{ steps.find.outputs.path }}.xz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}.xz
          path: ${{ steps.find.outputs.path }}.xz
          retention-days: 14
